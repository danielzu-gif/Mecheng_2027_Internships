name: Check ME Internships

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore previously-seen postings
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-postings-${{ github.run_id }}
          restore-keys: |
            seen-postings-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_internships.py
